apiVersion: v1
kind: Service
metadata:
  name: chat-service
  namespace: ai-production
spec:
  type: ClusterIP
  selector:
    app: chat-api
  ports:
  - port: 8000
    targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: risk-service
  namespace: ai-production
spec:
  type: ClusterIP
  selector:
    app: risk-api
  ports:
  - port: 8001
    targetPort: 8001
---
apiVersion: v1
kind: Service
metadata:
  name: ui-service
  namespace: ai-production
spec:
  type: NodePort
  selector:
    app: bankbot-ui
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30090
