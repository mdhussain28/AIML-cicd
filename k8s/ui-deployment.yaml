apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui-deployment
  namespace: ai-production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bankbot-ui
  template:
    metadata:
      labels:
        app: bankbot-ui
    spec:
      containers:
      - name: ui
        image: hussain2844/bankbot-ui:latest
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"
