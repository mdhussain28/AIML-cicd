apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-deployment
  namespace: ai-production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chat-api
  template:
    metadata:
      labels:
        app: chat-api
    spec:
      containers:
      - name: chat-api
        image: hussain2844/chat-api-cicd:8eb1988
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: chat-config
        env:
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: chat-secret
              key: DB_USERNAME
        - name: MODEL_DIR
          value: "/data"
        - name: APP_ENV
          value: "production"
        volumeMounts:
        - name: bankbot-storage
          mountPath: /data
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 10
          failureThreshold: 3
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "256Mi"
      volumes:
      - name: bankbot-storage
        persistentVolumeClaim:
          claimName: bankbot-data-pvc
